blueprint:
  name: "Aqara FP300 – Light & Climate Control v5.0.0"
  description: >
    Smart light & climate automation for the Aqara FP300 mmWave presence sensor.

    **Light:** 4 time-of-day profiles (Morning / Day / Evening / Night) with brightness
    and color temperature · Weekday & Weekend profiles · Configurable turn-off delay

    **Climate (optional):** Day & Night temperature profiles with Comfort → Setback → Eco stages

    Requires FP300 as `binary_sensor` (occupancy), optionally `sensor` (illuminance).

  domain: automation
  source_url: https://github.com/Pictus87/homeassistant-aqara-fp300-blueprint

  input:

    section_sensors:
      name: "1 · Sensors"
      icon: mdi:motion-sensor
      collapsed: true
      input:

        presence_sensor:
          name: "Presence Sensor"
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

        illuminance_sensor:
          name: "Illuminance Sensor (lux) – optional"
          description: "Leave empty to always turn on the light."
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: illuminance

        illuminance_threshold:
          name: "Illuminance Threshold (lux)"
          description: "Light turns on only when lux is BELOW this value."
          default: 50
          selector:
            number:
              min: 0
              max: 2000
              unit_of_measurement: lx
              mode: slider

    section_light:
      name: "2 · Light"
      icon: mdi:lightbulb-on
      collapsed: true
      input:

        light_target:
          name: "Light / Light Group"
          selector:
            target:
              entity:
                domain: light

        light_off_delay:
          name: "Turn-Off Delay (seconds)"
          default: 120
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: slider

    section_profiles_weekday:
      name: "3 · Time Profiles – Weekday (Mon–Fri)"
      icon: mdi:weather-sunny
      collapsed: true
      input:

        morning_start:
          name: "Morning – Start Time"
          default: "06:00:00"
          selector:
            time: {}
        morning_brightness:
          name: "Morning – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        morning_color_temp:
          name: "Morning – Color Temperature (K)"
          default: 3500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        day_start:
          name: "Day – Start Time"
          default: "09:00:00"
          selector:
            time: {}
        day_brightness:
          name: "Day – Brightness (%)"
          default: 100
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        day_color_temp:
          name: "Day – Color Temperature (K)"
          default: 5000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        evening_start:
          name: "Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}
        evening_brightness:
          name: "Evening – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        evening_color_temp:
          name: "Evening – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        night_start:
          name: "Night – Start Time"
          default: "22:00:00"
          selector:
            time: {}
        night_brightness:
          name: "Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        night_color_temp:
          name: "Night – Color Temperature (K)"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

    section_profiles_weekend:
      name: "4 · Time Profiles – Weekend (Sat–Sun)"
      icon: mdi:weather-night
      collapsed: true
      input:

        weekend_different_profiles:
          name: "Enable separate Weekend Profiles"
          description: "When disabled, weekday profiles apply on weekends too."
          default: false
          selector:
            boolean: {}

        we_morning_start:
          name: "WE Morning – Start Time"
          default: "08:00:00"
          selector:
            time: {}
        we_morning_brightness:
          name: "WE Morning – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_morning_color_temp:
          name: "WE Morning – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_day_start:
          name: "WE Day – Start Time"
          default: "10:00:00"
          selector:
            time: {}
        we_day_brightness:
          name: "WE Day – Brightness (%)"
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_day_color_temp:
          name: "WE Day – Color Temperature (K)"
          default: 4500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_evening_start:
          name: "WE Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}
        we_evening_brightness:
          name: "WE Evening – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_evening_color_temp:
          name: "WE Evening – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_night_start:
          name: "WE Night – Start Time"
          default: "23:00:00"
          selector:
            time: {}
        we_night_brightness:
          name: "WE Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_night_color_temp:
          name: "WE Night – Color Temperature (K)"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

    section_climate:
      name: "5 · Climate Control"
      icon: mdi:thermometer
      collapsed: true
      input:

        enable_climate:
          name: "Enable Climate Control"
          default: false
          selector:
            boolean: {}

        climate_target:
          name: "Thermostat / Climate Device"
          default: ""
          selector:
            entity:
              domain: climate

        climate_night_start:
          name: "Night Mode – Start Time"
          default: "22:00:00"
          selector:
            time: {}

        climate_day_start:
          name: "Day Mode – Start Time"
          default: "07:00:00"
          selector:
            time: {}

        temp_comfort:
          name: "Day – Comfort Temperature (°C)"
          default: 21.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_comfort_weekend:
          name: "Day – Comfort Temperature Weekend (°C)"
          default: 22.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_setback_delay:
          name: "Day – Setback Delay (minutes)"
          default: 15
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: min
              mode: slider

        temp_setback:
          name: "Day – Setback Temperature (°C)"
          default: 19.0
          selector:
            number:
              min: 10
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_eco_delay:
          name: "Day – Eco Mode Delay (minutes)"
          description: "Total time after leaving. Must be greater than Setback Delay."
          default: 60
          selector:
            number:
              min: 15
              max: 480
              unit_of_measurement: min
              mode: slider

        temp_eco:
          name: "Day – Eco Temperature (°C)"
          default: 17.0
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_comfort:
          name: "Night – Comfort Temperature (°C)"
          default: 18.0
          selector:
            number:
              min: 10
              max: 26
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_setback_delay:
          name: "Night – Setback Delay (minutes)"
          default: 30
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: min
              mode: slider

        temp_night_setback:
          name: "Night – Setback Temperature (°C)"
          default: 17.0
          selector:
            number:
              min: 10
              max: 24
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_eco_delay:
          name: "Night – Eco Mode Delay (minutes)"
          default: 60
          selector:
            number:
              min: 15
              max: 480
              unit_of_measurement: min
              mode: slider

        temp_night_eco:
          name: "Night – Eco Temperature (°C)"
          default: 16.0
          selector:
            number:
              min: 10
              max: 22
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

# ══════════════════════════════════════════════════════════
# VARIABLES — only values needed inside Jinja2 templates
# ══════════════════════════════════════════════════════════
variables:
  illuminance_sensor_v: !input illuminance_sensor
  illuminance_threshold_v: !input illuminance_threshold
  weekend_different_profiles_v: !input weekend_different_profiles
  enable_climate_v: !input enable_climate
  climate_target_v: !input climate_target

# ══════════════════════════════════════════════════════════
# TRIGGER
# ══════════════════════════════════════════════════════════
trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    id: "presence_on"
  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    id: "presence_off"

# ══════════════════════════════════════════════════════════
# ACTIONS
# ══════════════════════════════════════════════════════════
action:

  # ── PRESENCE DETECTED ──────────────────────────────────
  - if:
      - condition: trigger
        id: "presence_on"
    then:
      - choose:

          # ── Weekday profiles ─────────────────────────
          - conditions:
              - condition: template
                value_template: >-
                  {{ now().weekday() < 5 or not weekend_different_profiles_v }}
            sequence:
              - choose:

                  # Morning
                  - conditions:
                      - condition: time
                        after: !input morning_start
                        before: !input day_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input morning_brightness
                          color_temp_kelvin: !input morning_color_temp
                          transition: 2

                  # Day
                  - conditions:
                      - condition: time
                        after: !input day_start
                        before: !input evening_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input day_brightness
                          color_temp_kelvin: !input day_color_temp
                          transition: 2

                  # Evening
                  - conditions:
                      - condition: time
                        after: !input evening_start
                        before: !input night_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input evening_brightness
                          color_temp_kelvin: !input evening_color_temp
                          transition: 2

                  # Night
                  - conditions:
                      - condition: or
                        conditions:
                          - condition: time
                            after: !input night_start
                          - condition: time
                            before: !input morning_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input night_brightness
                          color_temp_kelvin: !input night_color_temp
                          transition: 2

          # ── Weekend profiles ─────────────────────────
          - conditions:
              - condition: template
                value_template: >-
                  {{ now().weekday() >= 5 and weekend_different_profiles_v }}
            sequence:
              - choose:

                  # WE Morning
                  - conditions:
                      - condition: time
                        after: !input we_morning_start
                        before: !input we_day_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input we_morning_brightness
                          color_temp_kelvin: !input we_morning_color_temp
                          transition: 2

                  # WE Day
                  - conditions:
                      - condition: time
                        after: !input we_day_start
                        before: !input we_evening_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input we_day_brightness
                          color_temp_kelvin: !input we_day_color_temp
                          transition: 2

                  # WE Evening
                  - conditions:
                      - condition: time
                        after: !input we_evening_start
                        before: !input we_night_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input we_evening_brightness
                          color_temp_kelvin: !input we_evening_color_temp
                          transition: 2

                  # WE Night
                  - conditions:
                      - condition: or
                        conditions:
                          - condition: time
                            after: !input we_night_start
                          - condition: time
                            before: !input we_morning_start
                      - condition: template
                        value_template: >-
                          {{ illuminance_sensor_v == '' or
                             states(illuminance_sensor_v) | float(0) < illuminance_threshold_v }}
                    sequence:
                      - action: light.turn_on
                        target: !input light_target
                        data:
                          brightness_pct: !input we_night_brightness
                          color_temp_kelvin: !input we_night_color_temp
                          transition: 2

      # Climate comfort temperature
      - if:
          - condition: template
            value_template: "{{ enable_climate_v and climate_target_v != '' }}"
        then:
          - choose:
              # Night mode
              - conditions:
                  - condition: or
                    conditions:
                      - condition: time
                        after: !input climate_night_start
                      - condition: time
                        before: !input climate_day_start
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_target_v }}"
                    data:
                      temperature: !input temp_night_comfort
              # Weekend day
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ now().weekday() >= 5 and weekend_different_profiles_v }}
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_target_v }}"
                    data:
                      temperature: !input temp_comfort_weekend
            # Weekday default
            default:
              - action: climate.set_temperature
                target:
                  entity_id: "{{ climate_target_v }}"
                data:
                  temperature: !input temp_comfort

  # ── PRESENCE CLEARED ───────────────────────────────────
  - if:
      - condition: trigger
        id: "presence_off"
    then:
      - delay:
          seconds: !input light_off_delay

      - condition: state
        entity_id: !input presence_sensor
        state: "off"

      - action: light.turn_off
        target: !input light_target
        data:
          transition: 3

      # Climate setback & eco
      - if:
          - condition: template
            value_template: "{{ enable_climate_v and climate_target_v != '' }}"
        then:
          - choose:
              # Night mode
              - conditions:
                  - condition: or
                    conditions:
                      - condition: time
                        after: !input climate_night_start
                      - condition: time
                        before: !input climate_day_start
                sequence:
                  - delay:
                      minutes: !input temp_night_setback_delay
                  - condition: state
                    entity_id: !input presence_sensor
                    state: "off"
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_target_v }}"
                    data:
                      temperature: !input temp_night_setback
                  - delay:
                      minutes: !input temp_night_eco_delay
                  - condition: state
                    entity_id: !input presence_sensor
                    state: "off"
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_target_v }}"
                    data:
                      temperature: !input temp_night_eco
            # Day mode (default)
            default:
              - delay:
                  minutes: !input temp_setback_delay
              - condition: state
                entity_id: !input presence_sensor
                state: "off"
              - action: climate.set_temperature
                target:
                  entity_id: "{{ climate_target_v }}"
                data:
                  temperature: !input temp_setback
              - delay:
                  minutes: !input temp_eco_delay
              - condition: state
                entity_id: !input presence_sensor
                state: "off"
              - action: climate.set_temperature
                target:
                  entity_id: "{{ climate_target_v }}"
                data:
                  temperature: !input temp_eco

mode: restart
