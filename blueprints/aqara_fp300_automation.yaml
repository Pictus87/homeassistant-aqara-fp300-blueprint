blueprint:
  name: "Aqara FP300 – Light & Climate Control v4.0.0"
  description: >
    Smart light & climate automation for the Aqara FP300 mmWave presence sensor.

    **Light:** 4 time-of-day profiles (Morning / Day / Evening / Night) with brightness,
    color temperature or scenes · Weekday & Weekend profiles · Configurable turn-off delay

    **Climate (optional):** Day & Night temperature profiles with Comfort → Setback → Eco stages

    Requires FP300 as `binary_sensor` (occupancy), optionally `sensor` (illuminance).

  domain: automation
  source_url: https://github.com/Pictus87/homeassistant-aqara-fp300-blueprint

  input:

    section_sensors:
      name: "1 · Sensors"
      icon: mdi:motion-sensor
      collapsed: true
      input:

        presence_sensor:
          name: "Presence Sensor"
          description: "Aqara FP300 binary_sensor (occupancy)"
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

        illuminance_sensor:
          name: "Illuminance Sensor (lux) – optional"
          description: "Leave empty to always turn on light regardless of brightness."
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: illuminance

        illuminance_threshold:
          name: "Illuminance Threshold (lux)"
          description: "Light turns on only when lux is BELOW this value. Ignored if no sensor set."
          default: 50
          selector:
            number:
              min: 0
              max: 2000
              unit_of_measurement: lx
              mode: slider

    section_light:
      name: "2 · Light"
      icon: mdi:lightbulb-on
      collapsed: true
      input:

        light_target:
          name: "Light / Light Group"
          selector:
            target:
              entity:
                domain: light

        light_off_delay:
          name: "Turn-Off Delay (seconds)"
          description: "How long the light stays on after the room is vacated."
          default: 120
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: slider

        use_scenes:
          name: "Use Scenes instead of Brightness / Color Temperature"
          default: false
          selector:
            boolean: {}

    section_profiles_weekday:
      name: "3 · Time Profiles – Weekday (Mon–Fri)"
      icon: mdi:weather-sunny
      collapsed: true
      input:

        morning_start:
          name: "Morning – Start Time"
          default: "06:00:00"
          selector:
            time: {}
        morning_brightness:
          name: "Morning – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        morning_color_temp:
          name: "Morning – Color Temperature (K)"
          default: 3500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        morning_scene:
          name: "Morning – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        day_start:
          name: "Day – Start Time"
          default: "09:00:00"
          selector:
            time: {}
        day_brightness:
          name: "Day – Brightness (%)"
          default: 100
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        day_color_temp:
          name: "Day – Color Temperature (K)"
          default: 5000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        day_scene:
          name: "Day – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        evening_start:
          name: "Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}
        evening_brightness:
          name: "Evening – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        evening_color_temp:
          name: "Evening – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        evening_scene:
          name: "Evening – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        night_start:
          name: "Night – Start Time"
          default: "22:00:00"
          selector:
            time: {}
        night_brightness:
          name: "Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        night_color_temp:
          name: "Night – Color Temperature (K)"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        night_scene:
          name: "Night – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

    section_profiles_weekend:
      name: "4 · Time Profiles – Weekend (Sat–Sun)"
      icon: mdi:weather-night
      collapsed: true
      input:

        weekend_different_profiles:
          name: "Enable separate Weekend Profiles"
          description: "When disabled, weekday profiles apply on weekends too."
          default: false
          selector:
            boolean: {}

        we_morning_start:
          name: "WE Morning – Start Time"
          default: "08:00:00"
          selector:
            time: {}
        we_morning_brightness:
          name: "WE Morning – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_morning_color_temp:
          name: "WE Morning – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        we_morning_scene:
          name: "WE Morning – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_day_start:
          name: "WE Day – Start Time"
          default: "10:00:00"
          selector:
            time: {}
        we_day_brightness:
          name: "WE Day – Brightness (%)"
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_day_color_temp:
          name: "WE Day – Color Temperature (K)"
          default: 4500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        we_day_scene:
          name: "WE Day – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_evening_start:
          name: "WE Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}
        we_evening_brightness:
          name: "WE Evening – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_evening_color_temp:
          name: "WE Evening – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        we_evening_scene:
          name: "WE Evening – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_night_start:
          name: "WE Night – Start Time"
          default: "23:00:00"
          selector:
            time: {}
        we_night_brightness:
          name: "WE Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider
        we_night_color_temp:
          name: "WE Night – Color Temperature (K)"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider
        we_night_scene:
          name: "WE Night – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

    section_climate:
      name: "5 · Climate Control"
      icon: mdi:thermometer
      collapsed: true
      input:

        enable_climate:
          name: "Enable Climate Control"
          default: false
          selector:
            boolean: {}

        climate_target:
          name: "Thermostat / Climate Device"
          default: ""
          selector:
            entity:
              domain: climate

        climate_night_start:
          name: "Night Mode – Start Time"
          description: "From this time onward, night temperatures are used."
          default: "22:00:00"
          selector:
            time: {}

        climate_day_start:
          name: "Day Mode – Start Time"
          description: "From this time onward, day temperatures are used again."
          default: "07:00:00"
          selector:
            time: {}

        temp_comfort:
          name: "Day – Comfort Temperature (°C)"
          default: 21.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_comfort_weekend:
          name: "Day – Comfort Temperature Weekend (°C)"
          description: "Only applies when Weekend Profiles are enabled."
          default: 22.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_setback_delay:
          name: "Day – Setback Delay (minutes)"
          default: 15
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: min
              mode: slider

        temp_setback:
          name: "Day – Setback Temperature (°C)"
          default: 19.0
          selector:
            number:
              min: 10
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_eco_delay:
          name: "Day – Eco Mode Delay (minutes)"
          description: "Total time after leaving until eco mode. Must be greater than Setback Delay."
          default: 60
          selector:
            number:
              min: 15
              max: 480
              unit_of_measurement: min
              mode: slider

        temp_eco:
          name: "Day – Eco Temperature (°C)"
          default: 17.0
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_comfort:
          name: "Night – Comfort Temperature (°C)"
          description: "Applied when presence is detected during the night (e.g. sleeping)."
          default: 18.0
          selector:
            number:
              min: 10
              max: 26
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_setback_delay:
          name: "Night – Setback Delay (minutes)"
          default: 30
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: min
              mode: slider

        temp_night_setback:
          name: "Night – Setback Temperature (°C)"
          default: 17.0
          selector:
            number:
              min: 10
              max: 24
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_night_eco_delay:
          name: "Night – Eco Mode Delay (minutes)"
          default: 60
          selector:
            number:
              min: 15
              max: 480
              unit_of_measurement: min
              mode: slider

        temp_night_eco:
          name: "Night – Eco Temperature (°C)"
          default: 16.0
          selector:
            number:
              min: 10
              max: 22
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

# ══════════════════════════════════════════════════════════
# VARIABLES — only static !input assignments here
# All derived/calculated values are computed inside the actions
# to avoid whitespace/boolean issues with global variable templates
# ══════════════════════════════════════════════════════════
variables:
  illuminance_sensor_v: !input illuminance_sensor
  illuminance_threshold_v: !input illuminance_threshold
  use_scenes_v: !input use_scenes
  weekend_different_profiles_v: !input weekend_different_profiles
  enable_climate_v: !input enable_climate
  climate_target_v: !input climate_target
  morning_start_v: !input morning_start
  day_start_v: !input day_start
  evening_start_v: !input evening_start
  night_start_v: !input night_start
  we_morning_start_v: !input we_morning_start
  we_day_start_v: !input we_day_start
  we_evening_start_v: !input we_evening_start
  we_night_start_v: !input we_night_start
  morning_brightness_v: !input morning_brightness
  day_brightness_v: !input day_brightness
  evening_brightness_v: !input evening_brightness
  night_brightness_v: !input night_brightness
  we_morning_brightness_v: !input we_morning_brightness
  we_day_brightness_v: !input we_day_brightness
  we_evening_brightness_v: !input we_evening_brightness
  we_night_brightness_v: !input we_night_brightness
  morning_color_temp_v: !input morning_color_temp
  day_color_temp_v: !input day_color_temp
  evening_color_temp_v: !input evening_color_temp
  night_color_temp_v: !input night_color_temp
  we_morning_color_temp_v: !input we_morning_color_temp
  we_day_color_temp_v: !input we_day_color_temp
  we_evening_color_temp_v: !input we_evening_color_temp
  we_night_color_temp_v: !input we_night_color_temp
  morning_scene_v: !input morning_scene
  day_scene_v: !input day_scene
  evening_scene_v: !input evening_scene
  night_scene_v: !input night_scene
  we_morning_scene_v: !input we_morning_scene
  we_day_scene_v: !input we_day_scene
  we_evening_scene_v: !input we_evening_scene
  we_night_scene_v: !input we_night_scene
  climate_night_start_v: !input climate_night_start
  climate_day_start_v: !input climate_day_start
  temp_comfort_v: !input temp_comfort
  temp_comfort_weekend_v: !input temp_comfort_weekend
  temp_setback_v: !input temp_setback
  temp_setback_delay_v: !input temp_setback_delay
  temp_eco_v: !input temp_eco
  temp_eco_delay_v: !input temp_eco_delay
  temp_night_comfort_v: !input temp_night_comfort
  temp_night_setback_v: !input temp_night_setback
  temp_night_setback_delay_v: !input temp_night_setback_delay
  temp_night_eco_v: !input temp_night_eco
  temp_night_eco_delay_v: !input temp_night_eco_delay

# ══════════════════════════════════════════════════════════
# TRIGGER
# ══════════════════════════════════════════════════════════
trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    id: "presence_on"
  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    id: "presence_off"

# ══════════════════════════════════════════════════════════
# ACTIONS
# ══════════════════════════════════════════════════════════
action:
  - variables:
      # Calculated fresh on every trigger inside the action
      is_weekend: "{{ now().weekday() >= 5 }}"
      use_weekend: "{{ weekend_different_profiles_v and is_weekend }}"

      lux_ok: >-
        {% if illuminance_sensor_v != '' and illuminance_sensor_v is not none %}
          {{ states(illuminance_sensor_v) | float(0) < illuminance_threshold_v | float(50) }}
        {% else %}
          true
        {% endif %}

      time_profile: >-
        {% set t = now().strftime('%H:%M:%S') %}
        {% if use_weekend %}
          {% if t >= we_night_start_v %}night
          {% elif t >= we_evening_start_v %}evening
          {% elif t >= we_day_start_v %}day
          {% else %}morning{% endif %}
        {% else %}
          {% if t >= night_start_v %}night
          {% elif t >= evening_start_v %}evening
          {% elif t >= day_start_v %}day
          {% else %}morning{% endif %}
        {% endif %}

      target_brightness: >-
        {% if use_weekend %}
          {% if time_profile == 'night' %}{{ we_night_brightness_v }}
          {% elif time_profile == 'evening' %}{{ we_evening_brightness_v }}
          {% elif time_profile == 'day' %}{{ we_day_brightness_v }}
          {% else %}{{ we_morning_brightness_v }}{% endif %}
        {% else %}
          {% if time_profile == 'night' %}{{ night_brightness_v }}
          {% elif time_profile == 'evening' %}{{ evening_brightness_v }}
          {% elif time_profile == 'day' %}{{ day_brightness_v }}
          {% else %}{{ morning_brightness_v }}{% endif %}
        {% endif %}

      target_color_temp_mireds: >-
        {% set k = (
          we_night_color_temp_v if (use_weekend and time_profile == 'night') else
          we_evening_color_temp_v if (use_weekend and time_profile == 'evening') else
          we_day_color_temp_v if (use_weekend and time_profile == 'day') else
          we_morning_color_temp_v if use_weekend else
          night_color_temp_v if time_profile == 'night' else
          evening_color_temp_v if time_profile == 'evening' else
          day_color_temp_v if time_profile == 'day' else
          morning_color_temp_v) | int %}
        {{ (1000000 / k) | int }}

      target_scene: >-
        {% if use_weekend %}
          {% if time_profile == 'night' %}{{ we_night_scene_v }}
          {% elif time_profile == 'evening' %}{{ we_evening_scene_v }}
          {% elif time_profile == 'day' %}{{ we_day_scene_v }}
          {% else %}{{ we_morning_scene_v }}{% endif %}
        {% else %}
          {% if time_profile == 'night' %}{{ night_scene_v }}
          {% elif time_profile == 'evening' %}{{ evening_scene_v }}
          {% elif time_profile == 'day' %}{{ day_scene_v }}
          {% else %}{{ morning_scene_v }}{% endif %}
        {% endif %}

      is_climate_night: >-
        {% set t = now().strftime('%H:%M:%S') %}
        {{ t >= climate_night_start_v or t < climate_day_start_v }}

      active_temp_comfort: >-
        {% if is_climate_night %}{{ temp_night_comfort_v }}
        {% elif use_weekend %}{{ temp_comfort_weekend_v }}
        {% else %}{{ temp_comfort_v }}{% endif %}

      active_setback_delay: >-
        {{ temp_night_setback_delay_v | int if is_climate_night else temp_setback_delay_v | int }}

      active_temp_setback: >-
        {{ temp_night_setback_v if is_climate_night else temp_setback_v }}

      active_eco_remaining: >-
        {% if is_climate_night %}
          {{ [temp_night_eco_delay_v | int - temp_night_setback_delay_v | int, 1] | max }}
        {% else %}
          {{ [temp_eco_delay_v | int - temp_setback_delay_v | int, 1] | max }}
        {% endif %}

      active_temp_eco: >-
        {{ temp_night_eco_v if is_climate_night else temp_eco_v }}

  - choose:

    # ──────────────────────────────────────────────────────
    # PRESENCE DETECTED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "presence_on"
      sequence:
        - if:
            - condition: template
              value_template: "{{ lux_ok == true or lux_ok == 'true' }}"
          then:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ use_scenes_v and target_scene | trim != '' }}"
                  sequence:
                    - action: scene.turn_on
                      target:
                        entity_id: "{{ target_scene | trim }}"
                      data:
                        transition: 2
              default:
                - action: light.turn_on
                  target: !input light_target
                  data:
                    brightness_pct: "{{ target_brightness | trim | int }}"
                    color_temp: "{{ target_color_temp_mireds | trim | int }}"
                    transition: 2

        - if:
            - condition: template
              value_template: "{{ enable_climate_v and climate_target_v != '' }}"
          then:
            - action: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: "{{ active_temp_comfort | trim | float }}"

    # ──────────────────────────────────────────────────────
    # PRESENCE CLEARED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "presence_off"
      sequence:
        - delay:
            seconds: !input light_off_delay

        - condition: state
          entity_id: !input presence_sensor
          state: "off"

        - action: light.turn_off
          target: !input light_target
          data:
            transition: 3

        - if:
            - condition: template
              value_template: "{{ enable_climate_v and climate_target_v != '' }}"
          then:
            - delay:
                minutes: "{{ active_setback_delay | trim | int }}"
            - condition: state
              entity_id: !input presence_sensor
              state: "off"
            - action: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: "{{ active_temp_setback | trim | float }}"

            - delay:
                minutes: "{{ active_eco_remaining | trim | int }}"
            - condition: state
              entity_id: !input presence_sensor
              state: "off"
            - action: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: "{{ active_temp_eco | trim | float }}"

mode: restart
