blueprint:
  name: "Aqara FP300 – Light & Climate Control (Advanced) v1.4.0"
  description: >
    Fully automated light and climate control powered by the Aqara FP300 mmWave presence sensor.


    **Light Control**

    - Turns light on when presence is detected AND illuminance is below a configurable threshold

    - 4 time-of-day profiles (Morning / Day / Evening / Night) with brightness & color temperature
      OR optional scenes per profile

    - Separate profiles for Weekdays vs. Weekend

    - Manual override protection — automation skips if light was turned on manually

    - Configurable minimum on-duration (prevents flickering on short walk-throughs)

    - Configurable turn-off delay after room is vacated


    **Climate Control** (optional)

    - Comfort temperature when presence is detected

    - Separate comfort temperature for weekends

    - Setback temperature after a short absence

    - Eco temperature after extended absence


    **Multi-Zone Support** (optional)

    - Up to 2 additional zones (Zone 2 & Zone 3), each with an independent
      presence sensor, light, turn-off delay and optional scene


    **Requirements:** Aqara FP300 integrated as `binary_sensor` (occupancy) and optionally
    as `sensor` (illuminance) in Home Assistant.

  domain: automation
  source_url: https://github.com/Pictus87/ha-blueprint-aqara-fp300

  input:

    # ══════════════════════════════════════════════════════
    # SECTION 1 – SENSORS
    # ══════════════════════════════════════════════════════
    section_sensors:
      name: "1 · Sensors"
      icon: mdi:motion-sensor
      input:

        presence_sensor:
          name: "Aqara FP300 – Main Presence Sensor"
          description: "binary_sensor of the FP300 (device or room presence)"
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

        illuminance_sensor:
          name: "Illuminance Sensor (lux) – optional"
          description: "Lux sensor of the FP300 or external. Leave empty to disable illuminance check."
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: illuminance

        illuminance_threshold:
          name: "Illuminance Threshold (lux)"
          description: "Light turns on only when lux is BELOW this value."
          default: 50
          selector:
            number:
              min: 0
              max: 2000
              unit_of_measurement: lx
              mode: slider

    # ══════════════════════════════════════════════════════
    # SECTION 2 – LIGHT GENERAL
    # ══════════════════════════════════════════════════════
    section_light_general:
      name: "2 · Light – General"
      icon: mdi:lightbulb-on
      input:

        light_target:
          name: "Main Light / Light Group"
          selector:
            target:
              entity:
                domain: light

        light_off_delay:
          name: "Turn-Off Delay (seconds)"
          description: "How long does the light stay on after the room is vacated?"
          default: 120
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: slider

        light_min_on_duration:
          name: "Minimum On-Duration (seconds)"
          description: >
            Light stays on for at least this duration, even if the person leaves immediately
            (e.g. short walk-through). Set to 0 to disable.
          default: 60
          selector:
            number:
              min: 0
              max: 600
              unit_of_measurement: s
              mode: slider

        use_scenes:
          name: "Use Scenes instead of Brightness / Color Temperature"
          description: >
            When enabled, the scenes configured below are activated instead of
            setting brightness and color temperature directly.
          default: false
          selector:
            boolean: {}

        manual_override_protection:
          name: "Manual Override Protection"
          description: >
            When enabled, the automation will NOT turn the light off if it was switched on
            manually (i.e. not by this automation). The automation resumes control once
            the light is turned off and presence is detected again.
          default: true
          selector:
            boolean: {}

    # ══════════════════════════════════════════════════════
    # SECTION 3 – TIME-OF-DAY PROFILES (Weekday)
    # ══════════════════════════════════════════════════════
    section_profiles_weekday:
      name: "3 · Time-of-Day Profiles – Weekday (Mon–Fri)"
      icon: mdi:weather-sunny
      input:

        # ── Morning ─────────────────────────────────────
        morning_start:
          name: "Morning – Start Time"
          default: "06:00:00"
          selector:
            time: {}

        morning_brightness:
          name: "Morning – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        morning_color_temp:
          name: "Morning – Color Temperature (K)"
          description: "Neutral warm, e.g. 3500 K"
          default: 3500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        morning_scene:
          name: "Morning – Scene (optional)"
          description: "Only used when 'Use Scenes' is enabled."
          default: ""
          selector:
            entity:
              domain: scene

        # ── Day ─────────────────────────────────────────
        day_start:
          name: "Day – Start Time"
          default: "09:00:00"
          selector:
            time: {}

        day_brightness:
          name: "Day – Brightness (%)"
          default: 100
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        day_color_temp:
          name: "Day – Color Temperature (K)"
          description: "Cool daylight white, e.g. 5000 K"
          default: 5000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        day_scene:
          name: "Day – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        # ── Evening ─────────────────────────────────────
        evening_start:
          name: "Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}

        evening_brightness:
          name: "Evening – Brightness (%)"
          default: 60
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        evening_color_temp:
          name: "Evening – Color Temperature (K)"
          description: "Warm & relaxed, e.g. 3000 K"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        evening_scene:
          name: "Evening – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        # ── Night ────────────────────────────────────────
        night_start:
          name: "Night – Start Time"
          default: "22:00:00"
          selector:
            time: {}

        night_brightness:
          name: "Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        night_color_temp:
          name: "Night – Color Temperature (K)"
          description: "Very warm & dim, e.g. 2200 K"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        night_scene:
          name: "Night – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

    # ══════════════════════════════════════════════════════
    # SECTION 4 – TIME-OF-DAY PROFILES (Weekend)
    # ══════════════════════════════════════════════════════
    section_profiles_weekend:
      name: "4 · Time-of-Day Profiles – Weekend (Sat–Sun)"
      icon: mdi:weather-night
      input:

        weekend_different_profiles:
          name: "Enable separate Weekend Profiles"
          description: "When disabled, weekday profiles apply on weekends too."
          default: false
          selector:
            boolean: {}

        we_morning_start:
          name: "WE Morning – Start Time"
          default: "08:00:00"
          selector:
            time: {}

        we_morning_brightness:
          name: "WE Morning – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        we_morning_color_temp:
          name: "WE Morning – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_morning_scene:
          name: "WE Morning – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_day_start:
          name: "WE Day – Start Time"
          default: "10:00:00"
          selector:
            time: {}

        we_day_brightness:
          name: "WE Day – Brightness (%)"
          default: 80
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        we_day_color_temp:
          name: "WE Day – Color Temperature (K)"
          default: 4500
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_day_scene:
          name: "WE Day – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_evening_start:
          name: "WE Evening – Start Time"
          default: "17:00:00"
          selector:
            time: {}

        we_evening_brightness:
          name: "WE Evening – Brightness (%)"
          default: 50
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        we_evening_color_temp:
          name: "WE Evening – Color Temperature (K)"
          default: 3000
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_evening_scene:
          name: "WE Evening – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

        we_night_start:
          name: "WE Night – Start Time"
          default: "23:00:00"
          selector:
            time: {}

        we_night_brightness:
          name: "WE Night – Brightness (%)"
          default: 15
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        we_night_color_temp:
          name: "WE Night – Color Temperature (K)"
          default: 2200
          selector:
            number:
              min: 2000
              max: 6500
              unit_of_measurement: K
              mode: slider

        we_night_scene:
          name: "WE Night – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

    # ══════════════════════════════════════════════════════
    # SECTION 5 – CLIMATE CONTROL
    # ══════════════════════════════════════════════════════
    section_climate:
      name: "5 · Climate Control"
      icon: mdi:thermometer
      input:

        enable_climate:
          name: "Enable Climate Control"
          default: false
          selector:
            boolean: {}

        climate_target:
          name: "Thermostat / Climate Device"
          default: ""
          selector:
            entity:
              domain: climate

        temp_comfort:
          name: "Comfort Temperature – Weekday (°C)"
          default: 21.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_comfort_weekend:
          name: "Comfort Temperature – Weekend (°C)"
          description: "Only applies when Weekend Profiles are enabled."
          default: 22.0
          selector:
            number:
              min: 15
              max: 30
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_setback_delay:
          name: "Setback Delay (minutes)"
          description: "How long after leaving before setback temperature is applied?"
          default: 15
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: min
              mode: slider

        temp_setback:
          name: "Setback Temperature (°C)"
          default: 19.0
          selector:
            number:
              min: 10
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        temp_eco_delay:
          name: "Eco Mode Delay (minutes)"
          description: "Total time after leaving until eco mode (includes setback delay)."
          default: 60
          selector:
            number:
              min: 15
              max: 480
              unit_of_measurement: min
              mode: slider

        temp_eco:
          name: "Eco Temperature (°C)"
          default: 17.0
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ══════════════════════════════════════════════════════
    # SECTION 6 – ZONE 2 (optional)
    # ══════════════════════════════════════════════════════
    section_zone2:
      name: "6 · Zone 2 – Second Sensor / Light (optional)"
      icon: mdi:map-marker-radius
      input:

        enable_zone2:
          name: "Enable Zone 2"
          default: false
          selector:
            boolean: {}

        zone2_presence_sensor:
          name: "Zone 2 – Presence Sensor"
          description: "e.g. a specific FP300 sub-zone or a second sensor."
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

        zone2_light_target:
          name: "Zone 2 – Light"
          description: "Light entity for Zone 2. Leave empty if Zone 2 is disabled."
          default: ""
          selector:
            entity:
              domain: light

        zone2_light_off_delay:
          name: "Zone 2 – Turn-Off Delay (seconds)"
          default: 60
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: slider

        zone2_brightness:
          name: "Zone 2 – Brightness (%) – all times of day"
          description: "Fixed brightness for Zone 2 (no time profile)."
          default: 70
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        zone2_scene:
          name: "Zone 2 – Scene (optional, overrides brightness)"
          default: ""
          selector:
            entity:
              domain: scene

    # ══════════════════════════════════════════════════════
    # SECTION 7 – ZONE 3 (optional)
    # ══════════════════════════════════════════════════════
    section_zone3:
      name: "7 · Zone 3 – Third Sensor / Light (optional)"
      icon: mdi:map-marker-radius-outline
      input:

        enable_zone3:
          name: "Enable Zone 3"
          default: false
          selector:
            boolean: {}

        zone3_presence_sensor:
          name: "Zone 3 – Presence Sensor"
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: occupancy

        zone3_light_target:
          name: "Zone 3 – Light"
          description: "Light entity for Zone 3. Leave empty if Zone 3 is disabled."
          default: ""
          selector:
            entity:
              domain: light

        zone3_light_off_delay:
          name: "Zone 3 – Turn-Off Delay (seconds)"
          default: 60
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: s
              mode: slider

        zone3_brightness:
          name: "Zone 3 – Brightness (%)"
          default: 70
          selector:
            number:
              min: 1
              max: 100
              unit_of_measurement: "%"
              mode: slider

        zone3_scene:
          name: "Zone 3 – Scene (optional)"
          default: ""
          selector:
            entity:
              domain: scene

# ══════════════════════════════════════════════════════════
# VARIABLES
# ══════════════════════════════════════════════════════════
variables:

  # --- Sensor ---
  illuminance_sensor_v: !input illuminance_sensor
  illuminance_threshold_v: !input illuminance_threshold
  current_lux: >
    {% if illuminance_sensor_v != '' and illuminance_sensor_v is not none %}
      {{ states(illuminance_sensor_v) | float(0) }}
    {% else %}
      0
    {% endif %}
  lux_ok: >
    {% if illuminance_sensor_v != '' and illuminance_sensor_v is not none %}
      {{ current_lux < illuminance_threshold_v }}
    {% else %}
      true
    {% endif %}

  # --- Scene toggle ---
  use_scenes_v: !input use_scenes

  # --- Manual override protection ---
  manual_override_protection_v: !input manual_override_protection

  # --- Weekend detection ---
  weekend_different_profiles_v: !input weekend_different_profiles
  is_weekend: "{{ now().weekday() >= 5 }}"
  use_weekend_profile: "{{ weekend_different_profiles_v and is_weekend }}"

  # --- Weekday profile inputs ---
  morning_start_v: !input morning_start
  day_start_v: !input day_start
  evening_start_v: !input evening_start
  night_start_v: !input night_start
  morning_brightness_v: !input morning_brightness
  day_brightness_v: !input day_brightness
  evening_brightness_v: !input evening_brightness
  night_brightness_v: !input night_brightness
  morning_color_temp_v: !input morning_color_temp
  day_color_temp_v: !input day_color_temp
  evening_color_temp_v: !input evening_color_temp
  night_color_temp_v: !input night_color_temp
  morning_scene_v: !input morning_scene
  day_scene_v: !input day_scene
  evening_scene_v: !input evening_scene
  night_scene_v: !input night_scene

  # --- Weekend profile inputs ---
  we_morning_start_v: !input we_morning_start
  we_day_start_v: !input we_day_start
  we_evening_start_v: !input we_evening_start
  we_night_start_v: !input we_night_start
  we_morning_brightness_v: !input we_morning_brightness
  we_day_brightness_v: !input we_day_brightness
  we_evening_brightness_v: !input we_evening_brightness
  we_night_brightness_v: !input we_night_brightness
  we_morning_color_temp_v: !input we_morning_color_temp
  we_day_color_temp_v: !input we_day_color_temp
  we_evening_color_temp_v: !input we_evening_color_temp
  we_night_color_temp_v: !input we_night_color_temp
  we_morning_scene_v: !input we_morning_scene
  we_day_scene_v: !input we_day_scene
  we_evening_scene_v: !input we_evening_scene
  we_night_scene_v: !input we_night_scene

  # --- Active time boundaries ---
  active_morning_start: "{{ we_morning_start_v if use_weekend_profile else morning_start_v }}"
  active_day_start:     "{{ we_day_start_v     if use_weekend_profile else day_start_v }}"
  active_evening_start: "{{ we_evening_start_v if use_weekend_profile else evening_start_v }}"
  active_night_start:   "{{ we_night_start_v   if use_weekend_profile else night_start_v }}"

  # --- Active time profile (morning / day / evening / night) ---
  time_profile: >
    {% set t = now().strftime('%H:%M:%S') %}
    {% if t >= active_night_start %}
      night
    {% elif t >= active_evening_start %}
      evening
    {% elif t >= active_day_start %}
      day
    {% else %}
      morning
    {% endif %}

  # --- Target brightness ---
  target_brightness: >
    {% if use_weekend_profile %}
      {% if time_profile == 'night' %}{{ we_night_brightness_v }}
      {% elif time_profile == 'evening' %}{{ we_evening_brightness_v }}
      {% elif time_profile == 'day' %}{{ we_day_brightness_v }}
      {% else %}{{ we_morning_brightness_v }}{% endif %}
    {% else %}
      {% if time_profile == 'night' %}{{ night_brightness_v }}
      {% elif time_profile == 'evening' %}{{ evening_brightness_v }}
      {% elif time_profile == 'day' %}{{ day_brightness_v }}
      {% else %}{{ morning_brightness_v }}{% endif %}
    {% endif %}

  # --- Target color temperature (Kelvin) ---
  target_color_temp_k: >
    {% if use_weekend_profile %}
      {% if time_profile == 'night' %}{{ we_night_color_temp_v }}
      {% elif time_profile == 'evening' %}{{ we_evening_color_temp_v }}
      {% elif time_profile == 'day' %}{{ we_day_color_temp_v }}
      {% else %}{{ we_morning_color_temp_v }}{% endif %}
    {% else %}
      {% if time_profile == 'night' %}{{ night_color_temp_v }}
      {% elif time_profile == 'evening' %}{{ evening_color_temp_v }}
      {% elif time_profile == 'day' %}{{ day_color_temp_v }}
      {% else %}{{ morning_color_temp_v }}{% endif %}
    {% endif %}

  # Kelvin → Mireds
  target_color_temp_mireds: "{{ (1000000 / (target_color_temp_k | int)) | int }}"

  # --- Target scene ---
  target_scene: >
    {% if use_weekend_profile %}
      {% if time_profile == 'night' %}{{ we_night_scene_v }}
      {% elif time_profile == 'evening' %}{{ we_evening_scene_v }}
      {% elif time_profile == 'day' %}{{ we_day_scene_v }}
      {% else %}{{ we_morning_scene_v }}{% endif %}
    {% else %}
      {% if time_profile == 'night' %}{{ night_scene_v }}
      {% elif time_profile == 'evening' %}{{ evening_scene_v }}
      {% elif time_profile == 'day' %}{{ day_scene_v }}
      {% else %}{{ morning_scene_v }}{% endif %}
    {% endif %}

  # --- Climate ---
  enable_climate_v: !input enable_climate
  climate_target_v: !input climate_target
  temp_comfort_v: !input temp_comfort
  temp_comfort_weekend_v: !input temp_comfort_weekend
  active_temp_comfort: "{{ temp_comfort_weekend_v if use_weekend_profile else temp_comfort_v }}"
  temp_setback_delay_v: !input temp_setback_delay
  temp_eco_delay_v: !input temp_eco_delay
  temp_eco_remaining_v: "{{ [temp_eco_delay_v | int - temp_setback_delay_v | int, 1] | max }}"

  # --- Minimum on-duration ---
  light_min_on_duration_v: !input light_min_on_duration

  # --- Zones ---
  enable_zone2_v: !input enable_zone2
  zone2_presence_sensor_v: !input zone2_presence_sensor
  zone2_light_target_v: !input zone2_light_target
  zone2_brightness_v: !input zone2_brightness
  zone2_scene_v: !input zone2_scene
  zone2_light_off_delay_v: !input zone2_light_off_delay

  enable_zone3_v: !input enable_zone3
  zone3_presence_sensor_v: !input zone3_presence_sensor
  zone3_light_target_v: !input zone3_light_target
  zone3_brightness_v: !input zone3_brightness
  zone3_scene_v: !input zone3_scene
  zone3_light_off_delay_v: !input zone3_light_off_delay

# ══════════════════════════════════════════════════════════
# TRIGGER
# ══════════════════════════════════════════════════════════
trigger:
  - platform: state
    entity_id: !input presence_sensor
    to: "on"
    id: "presence_on"
  - platform: state
    entity_id: !input presence_sensor
    to: "off"
    id: "presence_off"

  # Zone 2 — guarded via condition when disabled
  - platform: state
    entity_id: !input zone2_presence_sensor
    to: "on"
    id: "zone2_on"
  - platform: state
    entity_id: !input zone2_presence_sensor
    to: "off"
    id: "zone2_off"

  # Zone 3
  - platform: state
    entity_id: !input zone3_presence_sensor
    to: "on"
    id: "zone3_on"
  - platform: state
    entity_id: !input zone3_presence_sensor
    to: "off"
    id: "zone3_off"

# ══════════════════════════════════════════════════════════
# ACTIONS
# ══════════════════════════════════════════════════════════
action:
  - choose:

    # ──────────────────────────────────────────────────────
    # MAIN SENSOR: PRESENCE DETECTED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "presence_on"
      sequence:
        - if:
            - condition: template
              value_template: "{{ lux_ok }}"
          then:
            - choose:
                # Call scene
                - conditions:
                    - condition: template
                      value_template: "{{ use_scenes_v and target_scene != '' }}"
                  sequence:
                    # Store automation context ID so we can detect manual overrides later
                    - variables:
                        automation_last_context: "{{ context.id }}"
                    - service: scene.turn_on
                      target:
                        entity_id: "{{ target_scene }}"
                      data:
                        transition: 2
              # Set brightness & color temperature directly
              default:
                - variables:
                    automation_last_context: "{{ context.id }}"
                - service: light.turn_on
                  target: !input light_target
                  data:
                    brightness_pct: "{{ target_brightness }}"
                    color_temp: "{{ target_color_temp_mireds }}"
                    transition: 2

        # Set comfort temperature
        - if:
            - condition: template
              value_template: "{{ enable_climate_v and climate_target_v != '' }}"
          then:
            - service: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: "{{ active_temp_comfort }}"

    # ──────────────────────────────────────────────────────
    # MAIN SENSOR: PRESENCE CLEARED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "presence_off"
      sequence:
        # Respect minimum on-duration
        - if:
            - condition: template
              value_template: "{{ light_min_on_duration_v | int > 0 }}"
          then:
            - delay:
                seconds: "{{ light_min_on_duration_v }}"

        # Turn-off delay
        - delay:
            seconds: !input light_off_delay

        # Only proceed if room is still empty
        - condition: state
          entity_id: !input presence_sensor
          state: "off"

        # Manual override protection:
        # Check if the last context that turned the light on matches this automation.
        # If the light is on but was NOT turned on by this automation, skip turn-off.
        - if:
            - condition: template
              value_template: >
                {% set light_entity = namespace(id='') %}
                {% set t = !input light_target %}
                {% if t.entity_id is defined %}
                  {% set light_entity.id = t.entity_id %}
                {% elif t.area_id is defined %}
                  {% set light_entity.id = '' %}
                {% endif %}
                {% if manual_override_protection_v and light_entity.id != '' %}
                  {% set last_ctx = state_attr(light_entity.id, 'context') %}
                  {% set light_on = states(light_entity.id) == 'on' %}
                  {% if light_on and last_ctx is not none %}
                    {{ last_ctx.get('id','') != automation_last_context | default('') }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
          then:
            # Light was turned on manually — skip automatic turn-off
            - stop: "Manual override detected – skipping automatic turn-off"

        - service: light.turn_off
          target: !input light_target
          data:
            transition: 3

        # Climate: setback & eco
        - if:
            - condition: template
              value_template: "{{ enable_climate_v and climate_target_v != '' }}"
          then:
            - delay:
                minutes: "{{ temp_setback_delay_v | int }}"
            - condition: state
              entity_id: !input presence_sensor
              state: "off"
            - service: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: !input temp_setback

            # Eco: remaining time = eco_delay − setback_delay (min. 1 min)
            - delay:
                minutes: "{{ temp_eco_remaining_v | int }}"
            - condition: state
              entity_id: !input presence_sensor
              state: "off"
            - service: climate.set_temperature
              target:
                entity_id: "{{ climate_target_v }}"
              data:
                temperature: !input temp_eco

    # ──────────────────────────────────────────────────────
    # ZONE 2: PRESENCE DETECTED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "zone2_on"
        - condition: template
          value_template: "{{ enable_zone2_v and zone2_presence_sensor_v != '' and zone2_light_target_v != '' }}"
      sequence:
        - if:
            - condition: template
              value_template: "{{ lux_ok }}"
          then:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ zone2_scene_v != '' }}"
                  sequence:
                    - service: scene.turn_on
                      target:
                        entity_id: "{{ zone2_scene_v }}"
                      data:
                        transition: 2
              default:
                - service: light.turn_on
                  target:
                    entity_id: "{{ zone2_light_target_v }}"
                  data:
                    brightness_pct: "{{ zone2_brightness_v }}"
                    transition: 2

    # ──────────────────────────────────────────────────────
    # ZONE 2: PRESENCE CLEARED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "zone2_off"
        - condition: template
          value_template: "{{ enable_zone2_v and zone2_presence_sensor_v != '' and zone2_light_target_v != '' }}"
      sequence:
        - delay:
            seconds: "{{ zone2_light_off_delay_v }}"
        - condition: template
          value_template: "{{ states(zone2_presence_sensor_v) == 'off' }}"
        - service: light.turn_off
          target:
            entity_id: "{{ zone2_light_target_v }}"
          data:
            transition: 3

    # ──────────────────────────────────────────────────────
    # ZONE 3: PRESENCE DETECTED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "zone3_on"
        - condition: template
          value_template: "{{ enable_zone3_v and zone3_presence_sensor_v != '' and zone3_light_target_v != '' }}"
      sequence:
        - if:
            - condition: template
              value_template: "{{ lux_ok }}"
          then:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ zone3_scene_v != '' }}"
                  sequence:
                    - service: scene.turn_on
                      target:
                        entity_id: "{{ zone3_scene_v }}"
                      data:
                        transition: 2
              default:
                - service: light.turn_on
                  target:
                    entity_id: "{{ zone3_light_target_v }}"
                  data:
                    brightness_pct: "{{ zone3_brightness_v }}"
                    transition: 2

    # ──────────────────────────────────────────────────────
    # ZONE 3: PRESENCE CLEARED
    # ──────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "zone3_off"
        - condition: template
          value_template: "{{ enable_zone3_v and zone3_presence_sensor_v != '' and zone3_light_target_v != '' }}"
      sequence:
        - delay:
            seconds: "{{ zone3_light_off_delay_v }}"
        - condition: template
          value_template: "{{ states(zone3_presence_sensor_v) == 'off' }}"
        - service: light.turn_off
          target:
            entity_id: "{{ zone3_light_target_v }}"
          data:
            transition: 3

mode: parallel
max: 4
